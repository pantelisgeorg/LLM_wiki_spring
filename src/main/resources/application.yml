server:
  port: 8080

wiki:
  root: ${user.home}/llm-wiki
  search:
    max-pages: 8
  consolidate:
    enabled: true
    # OpenAI text-embedding-3-small clusters related content in the 0.3–0.6 cosine range;
    # 0.40 was calibrated for the old EmbeddingGemma model and filtered everything out.
    # 0.20 keeps a safety net for tightly-related but lexically-distinct Greek concepts.
    cosine-floor: 0.20
    neighbors-per-page: 3
    candidates-from-qmd: 15
  ingest:
    chunk-gap-ms: 3000
    reset-every-n-chunks: 0
    reset-command: ""
    classifier:
      enabled: true
      known-types:
        - paper
        - paper_simple
        - article
        - web
        - youtube
        - podcast
        - book_chapter
        - concept_note
        - generic
    quality-gate:
      enabled: true
      type-gates:
        paper: [check_falsifiability, fact_check, find_logical_fallacies]
        paper_simple: [fact_check]
        article: [find_logical_fallacies, fact_check]
        web: [fact_check]
        youtube: [fact_check]
        podcast: [fact_check]
        book_chapter: [find_logical_fallacies]
        concept_note: []
        generic: [fact_check]

spring:
  ai:
    retry:
      max-attempts: 1
    openai:
      base-url: https://api.openai.com
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.2
          # gpt-4o-mini supports up to 16384 output tokens. 6000 was cutting off ingest
          # responses mid-page (8 entities × 1500 chars + 8 concepts × 1500 chars ≈ 6500
          # tokens). 12000 leaves comfortable headroom.
          max-tokens: 12000
      embedding:
        options:
          model: text-embedding-3-small
  mvc:
    async:
      request-timeout: -1
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

logging:
  level:
    com.wiki: DEBUG
