server:
  port: 8080

qmd:
  url: http://localhost:8181/mcp
  auto-start: true                     # probe /health on boot; if down, shell out start-command
  start-command: "QMD_LLAMA_GPU=off qmd mcp --http --daemon"

wiki:
  root: ${user.home}/llm-wiki
  search:
    max-pages: 8
  ingest:
    chunk-gap-ms: 3000
    reset-every-n-chunks: 0
    reset-command: ""

spring:
  ai:
    retry:
      max-attempts: 1
    openai:
      base-url: http://localhost:8888

      api-key:  sk-unsloth-113da9d10b168cca34e7a183c42f06bd
      chat:
        options:
          model: unsloth/gemma-4-E4B-it-GGUF
          temperature: 0.2
          max-tokens: 800
  mvc:
    async:
      request-timeout: -1
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

logging:
  level:
    com.wiki: DEBUG
