server:
  port: 8080

qmd:
  url: http://localhost:8181/mcp
  auto-start: true                     # probe /health on boot; if down, shell out start-command
  start-command: "QMD_LLAMA_GPU=off qmd mcp --http --daemon"
  reembed-command: "QMD_LLAMA_GPU=off qmd embed"   # shelled out after /api/wiki/reset; set empty to skip

wiki:
  root: ${user.home}/llm-wiki
  search:
    max-pages: 8
  consolidate:
    enabled: true
    cosine-floor: 0.40
    neighbors-per-page: 3
    candidates-from-qmd: 15
  ingest:
    chunk-gap-ms: 3000
    reset-every-n-chunks: 0
    reset-command: ""
    classifier:
      enabled: true
      known-types:
        - paper
        - paper_simple
        - article
        - web
        - youtube
        - podcast
        - book_chapter
        - concept_note
        - generic
    quality-gate:
      enabled: true
      type-gates:
        paper: [check_falsifiability, fact_check, find_logical_fallacies]
        paper_simple: [fact_check]
        article: [find_logical_fallacies, fact_check]
        web: [fact_check]
        youtube: [fact_check]
        podcast: [fact_check]
        book_chapter: [find_logical_fallacies]
        concept_note: []
        generic: [fact_check]

spring:
  ai:
    retry:
      max-attempts: 1
    openai:
      base-url: https://api.openai.com
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.2
          max-tokens: 6000
  mvc:
    async:
      request-timeout: -1
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

logging:
  level:
    com.wiki: DEBUG
