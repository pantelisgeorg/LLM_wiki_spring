<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LLM Wiki</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --border: #2a2f3a;
    --fg: #d7dae0; --muted: #8a93a6; --accent: #7aa2f7; --err: #e06c75;
    --entity: #7aa2f7; --concept: #bb9af7; --source: #9ece6a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  #app { display: grid; grid-template-rows: auto 1fr; height: 100%; }
  header { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  header input[type=text] { flex: 1; min-width: 280px; padding: 6px 10px; background: var(--panel); color: var(--fg);
    border: 1px solid var(--border); border-radius: 4px; }
  header button, header label.btn { padding: 6px 12px; background: var(--panel); color: var(--fg);
    border: 1px solid var(--border); border-radius: 4px; cursor: pointer; }
  header button:hover, header label.btn:hover { border-color: var(--accent); }
  header input[type=file] { display: none; }

  main { display: grid; grid-template-columns: 260px 1fr 1fr; overflow: hidden; }
  .col { overflow-y: auto; padding: 12px 16px; }
  #tree { border-right: 1px solid var(--border); display: flex; flex-direction: column; padding-top: 0; }
  #tree h3 { margin: 12px 0 6px; }
  #tree-search { width: 100%; padding: 4px 8px; margin-bottom: 8px; background: var(--panel); color: var(--fg);
    border: 1px solid var(--border); border-radius: 4px; font: inherit; }
  #tree-body { flex: 1; }
  #tree ul { list-style: none; padding-left: 0; margin: 0; }
  #tree li { cursor: pointer; padding: 2px 0; color: var(--muted); word-break: break-word; }
  #tree li:hover, #tree li.active { color: var(--accent); }
  #tree li.hidden { display: none; }
  #tree .section { color: var(--fg); font-weight: 600; margin-top: 8px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }

  #output { border-right: 1px solid var(--border); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; white-space: pre-wrap; }
  #preview h1, #preview h2, #preview h3 { border-bottom: 1px solid var(--border); padding-bottom: 4px; }
  #preview a { color: var(--accent); }
  #preview code { background: var(--panel); padding: 1px 4px; border-radius: 3px; }
  #preview pre { background: var(--panel); padding: 10px; border-radius: 4px; overflow-x: auto; }
  #preview table { border-collapse: collapse; }
  #preview th, #preview td { border: 1px solid var(--border); padding: 4px 8px; }

  .toc { background: var(--panel); border: 1px solid var(--border); border-radius: 4px;
    padding: 8px 12px; margin-bottom: 12px; font-size: 12px; }
  .toc-title { color: var(--muted); font-weight: 600; margin-bottom: 4px; }
  .toc a { display: inline-block; margin-right: 12px; color: var(--accent); text-decoration: none; }
  .toc a.h3 { padding-left: 12px; color: var(--muted); }
  .toc a:hover { text-decoration: underline; }

  .backlinks { margin-top: 24px; padding: 12px; background: var(--panel);
    border: 1px solid var(--border); border-radius: 4px; }
  .backlinks-title { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .backlinks a { display: block; color: var(--accent); text-decoration: none; padding: 2px 0; }
  .backlinks a:hover { text-decoration: underline; }
  .backlinks.empty { color: var(--muted); font-style: italic; }

  .qmd-results { list-style: none; padding-left: 0; margin: 8px 0; }
  .qmd-results li { padding: 6px 0; border-bottom: 1px solid var(--border); }
  .qmd-results .score { color: var(--muted); font-variant-numeric: tabular-nums; margin-right: 8px; }
  .qmd-results .path { color: var(--muted); font-size: 12px; margin-left: 6px; }
  .qmd-results a { color: var(--accent); text-decoration: none; }
  .qmd-results a:hover { text-decoration: underline; }
  .qmd-results .snippet { color: var(--muted); font-size: 12px; margin-top: 4px; white-space: pre-wrap;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }

  .status { color: var(--muted); }
  .error { color: var(--err); }
  .event { margin: 2px 0; }
  .event .tag { color: var(--accent); margin-right: 6px; }

  /* Graph overlay */
  #graph-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: none; flex-direction: column; }
  #graph-overlay.open { display: flex; }
  #graph-header { padding: 8px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; align-items: center; }
  #graph-header .legend { display: flex; gap: 12px; color: var(--muted); font-size: 12px; }
  #graph-header .legend span::before { content: "●"; margin-right: 4px; }
  #graph-header .legend .entity::before { color: var(--entity); }
  #graph-header .legend .concept::before { color: var(--concept); }
  #graph-header .legend .source::before { color: var(--source); }
  #graph-canvas { flex: 1 1 0; min-height: 0; width: 100%; }
</style>
</head>
<body>
<div id="app">
  <header>
    <input id="input" type="text" placeholder="question, URL, or local path — or pick a file…">
    <label class="btn" for="file">File…</label>
    <input id="file" type="file">
    <input id="start-chunk" type="number" min="1" placeholder="start chunk"
           title="Resume a chunked ingest from chunk N (for when LM Studio froze mid-run)"
           style="width: 110px; padding: 6px 10px; background: var(--panel); color: var(--fg);
                  border: 1px solid var(--border); border-radius: 4px;">
    <button id="btn-ingest">Ingest</button>
    <button id="btn-query">Query</button>
    <button id="btn-qmd" title="Search the wiki via qmd (local hybrid BM25 + vector + rerank)">QMD</button>
    <button id="btn-fetch" title="Fetch via qmd: glob (e.g. wiki/entities/*.md), path, or docid (#abc123)">Fetch</button>
    <button id="btn-lint">Lint</button>
    <button id="btn-consolidate" title="Propose cross-links across concept pages (preview, then apply)">Consolidate</button>
    <button id="btn-graph">Graph</button>
    <button id="btn-clear" title="Clear the right preview panel">Clear</button>
    <button id="btn-reset" title="Delete all wiki/ pages, index, and log. Keeps raw/ sources. Cannot be undone.">Reset</button>
    <span id="qmd-status" class="status" title="qmd MCP HTTP daemon status" style="font-size:12px; margin-left:auto;">qmd daemon: …</span>
  </header>
  <main>
    <div id="tree" class="col">
      <h3>Pages</h3>
      <input id="tree-search" type="text" placeholder="filter pages… (Ctrl+K)">
      <div id="tree-body"><em class="status">loading…</em></div>
    </div>
    <div id="output" class="col"></div>
    <div id="preview" class="col"><em class="status">click a page or citation</em></div>
  </main>
</div>

<div id="graph-overlay">
  <div id="graph-header">
    <strong>Wiki Graph</strong>
    <div class="legend">
      <span class="entity">entity</span>
      <span class="concept">concept</span>
      <span class="source">source</span>
    </div>
    <div style="flex:1"></div>
    <span class="status">click a node to open it · esc to close</span>
    <button id="btn-graph-close">Close</button>
  </div>
  <div id="graph-canvas"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<script src="app.js"></script>
</body>
</html>
